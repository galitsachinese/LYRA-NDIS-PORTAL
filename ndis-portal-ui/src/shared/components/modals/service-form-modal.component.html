<!-- BACKDROP -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" data-testid="service-modal">

  <!-- MODAL -->
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl p-6">

    <!-- HEADER -->
    <div class="text-center mb-6">

      <h2 class="text-2xl font-bold text-slate-900">
        Add New Service
      </h2>

      <p class="text-sm text-slate-500 mt-2">
        Fill in the details below to register a new service in the system.
      </p>

      <!-- CLOSE BUTTON -->
      <button (click)="onClose.emit()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-2xl">
        ✕
      </button>

    </div>

    <!-- FORM -->
    <form [formGroup]="serviceForm" (ngSubmit)="submit()" class="space-y-6">

      <!-- SERVICE NAME -->
      <div>

        <label class="block text-sm font-semibold text-slate-700 mb-2">
          Service Name *
        </label>

        <input type="text" formControlName="name" placeholder="e.g. Community Access Assistance"
          class="w-full h-12 border border-slate-300 rounded-lg px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />

        <!-- VALIDATION -->
        <p *ngIf="serviceForm.controls.name.touched && serviceForm.controls.name.invalid"
          class="text-red-500 text-xs mt-1">
          Service name is required
        </p>

      </div>

      <!-- CATEGORY DROPDOWN -->
      <div>

        <label class="block text-sm font-semibold text-slate-700 mb-2">
          Category *
        </label>

        <select formControlName="category"
          class="w-full h-12 border border-slate-300 rounded-lg px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white">

          <option value="" disabled selected>Select a service category</option>
          <option *ngFor="let cat of categories" [value]="cat.id">
            {{ cat.name || cat.title }}
          </option>

        </select>

        <!-- VALIDATION -->
        <p *ngIf="serviceForm.controls.category.touched && serviceForm.controls.category.invalid"
          class="text-red-500 text-xs mt-1">
          Category is required
        </p>

      </div>

      <!-- DESCRIPTION (FULL WIDTH) -->
      <div>

        <label class="block text-sm font-semibold text-slate-700 mb-2">
          Description
        </label>

        <textarea formControlName="description" rows="4" placeholder="Provide a detailed overview of the service scope, pricing limits, and reporting requirements."
          class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>

      </div>

      <!-- TOGGLE SWITCH: ACTIVE ON CREATION -->
      <div class="flex items-center justify-between py-2">

        <div>
          <label class="block text-sm font-semibold text-slate-700">
            Active on creation
          </label>
          <p class="text-xs text-slate-500 mt-1">
            Publish this service immediately
          </p>
        </div>

        <button
          type="button"
          (click)="toggleActiveCreation()"
          class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
          [ngClass]="isActiveOnCreation ? 'bg-green-500' : 'bg-slate-300'"
        >
          <span class="sr-only">Toggle active on creation</span>
          <span
            class="inline-block h-4 w-4 rounded-full bg-white transition-transform"
            [ngClass]="isActiveOnCreation ? 'translate-x-6' : 'translate-x-1'"
          ></span>
        </button>

      </div>

      <!-- ACTION BUTTONS -->
      <div class="flex justify-end gap-3 pt-4 border-t border-slate-200">

        <!-- CANCEL -->
        <button type="button" (click)="onClose.emit()"
          class="px-6 py-2.5 border border-slate-300 rounded-lg text-slate-700 font-medium hover:bg-slate-50 transition-colors">
          Cancel
        </button>

        <!-- SAVE -->
        <button type="submit" data-testid="save-btn" [disabled]="serviceForm.invalid"
          class="px-6 py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:bg-slate-300 disabled:text-slate-500 transition-colors">
          Save Service
        </button>

      </div>

    </form>

  </div>

</div>

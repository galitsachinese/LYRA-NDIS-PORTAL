<aside
  class="fixed z-50 flex h-screen flex-col border-r border-slate-200 bg-white transition-all duration-300 ease-in-out md:relative"
  [class.w-64]="!isCollapsed"
  [class.w-20]="isCollapsed"
  [class.-translate-x-full]="isCollapsed && isMobile"
  [class.translate-x-0]="!isCollapsed && isMobile"
>
  <div
    class="mb-2 hidden h-16 items-center justify-between md:flex"
    [class.px-4]="!isCollapsed"
    [class.px-5]="isCollapsed"
  >
    <button
      type="button"
      (click)="toggle()"
      class="rounded-full p-2 text-slate-900 transition-colors hover:bg-slate-100"
      aria-label="Toggle sidebar"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-6 w-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>

    <app-icon-sidebar
      *ngIf="!isCollapsed"
      class="ml-4 font-bold text-slate-900"
      (click)="toggle()"
    ></app-icon-sidebar>
  </div>

  <nav class="mt-4 flex flex-1 flex-col gap-2 px-3 md:mt-0">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.path"
      routerLinkActive="bg-[#f3f0ff] text-[#6b21a8]"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="isMobile && closeSidebar()"
      class="group relative flex h-12 items-center rounded-xl transition-all duration-200"
      [class.justify-center]="isCollapsed"
      [class.px-3]="!isCollapsed"
    >
      <div class="flex min-w-[24px] items-center justify-center">
        <ng-container [ngSwitch]="item.icon">
          <app-icon-home *ngSwitchCase="'home'"></app-icon-home>
          <app-icon-dashboard *ngSwitchCase="'dashboard'"></app-icon-dashboard>
          <app-icon-service *ngSwitchCase="'services'"></app-icon-service>
          <app-icon-support *ngSwitchCase="'support'"></app-icon-support>
          <app-icon-book *ngSwitchCase="'bookings'"></app-icon-book>
          <app-icon-book-new *ngSwitchCase="'book-new'"></app-icon-book-new>
        </ng-container>
      </div>

      <span *ngIf="!isCollapsed" class="ml-4 overflow-hidden whitespace-nowrap text-sm font-medium">
        {{ item.label }}
      </span>

      <div
        *ngIf="isCollapsed"
        class="invisible absolute left-full z-50 ml-4 whitespace-nowrap rounded bg-slate-800 px-2 py-1 text-xs text-white opacity-0 transition-all pointer-events-none group-hover:visible group-hover:opacity-100"
      >
        {{ item.label }}
      </div>
    </a>
  </nav>

  <div class="border-t border-slate-200 p-3">
    <button
      type="button"
      (click)="openLogoutDialog()"
      class="flex h-12 w-full items-center rounded-xl text-red-600 transition-all duration-200 hover:bg-red-50"
      [class.justify-center]="isCollapsed"
      [class.justify-start]="!isCollapsed"
      [class.px-3]="!isCollapsed"
    >
      <div class="flex min-w-[24px] items-center justify-center">
        <app-icon-logout class="h-5 w-5"></app-icon-logout>
      </div>

      <span *ngIf="!isCollapsed" class="ml-4 text-sm font-medium">
        Logout
      </span>
    </button>
  </div>
</aside>

<app-dialog-ui [label]="'Confirm Logout'" [isOpen]="isLogoutDialogOpen" (close)="closeLogoutDialog()">
  <div body>
    Are you sure you want to log out?
  </div>

  <div actions class="flex w-full justify-end gap-2">
    <button
      type="button"
      (click)="closeLogoutDialog()"
      class="rounded-lg border border-slate-300 px-4 py-2 text-sm hover:bg-slate-100"
    >
      Cancel
    </button>

    <button
      type="button"
      (click)="confirmLogout()"
      class="rounded-lg bg-red-600 px-4 py-2 text-sm text-white hover:bg-red-700"
    >
      Logout
    </button>
  </div>
</app-dialog-ui>

<div
  *ngIf="!isCollapsed && isMobile"
  class="fixed inset-0 z-40 bg-black/20 md:hidden"
  (click)="closeSidebar()"
></div>

<div class="relative inline-block w-full font-sans sm:w-auto">

  <button type="button" (click)="toggle($event)"
    class="flex items-center justify-between w-full min-w-[160px] h-10 px-4 gap-3 bg-white border rounded-xl cursor-pointer transition-all focus:outline-none"
    [class.border-violet-600]="isOpen" [class.ring-4]="isOpen" [class.ring-violet-600]="isOpen"
    [class.border-slate-200]="!isOpen">

    <span class="flex items-center gap-2 truncate">
      <span class="text-slate-400">
        <app-icon-filter [size]="16"></app-icon-filter>
      </span>
      <span class="text-sm font-semibold text-slate-700 capitalize">
        {{ getSelectedLabel() }}
      </span>
    </span>

    <span class="text-slate-400 transition-transform duration-300" [class.rotate-180]="isOpen">
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 1L5 5L9 1" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </span>
  </button>

  <div *ngIf="isOpen"
    class="absolute top-[calc(100%+8px)] left-0 z-[9999] min-w-[200px] p-2 bg-white border border-slate-100 rounded-2xl shadow-xl">

    <button *ngFor="let option of statusOptions" type="button" (click)="handleSelect(option.value, $event)"
      class="flex items-center justify-between w-full px-3 py-2.5 text-sm font-medium rounded-lg"
      [ngClass]="option.value === activeStatus ? 'bg-violet-50 text-violet-700' : 'text-slate-600 hover:bg-slate-50'">

      <span>{{ option.label }}</span>
    </button>
  </div>
</div>

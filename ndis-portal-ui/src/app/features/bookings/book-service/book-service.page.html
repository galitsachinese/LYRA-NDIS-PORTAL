<div class="book-service-page">
  <header class="booking-header">
    <h1>Book a Service</h1>
    <p>Select a service and preferred date to submit your booking request.</p>
  </header>

  <section class="booking-card" aria-label="Book a service form">
    <button type="button" class="back-link" (click)="navBack()">
      <span aria-hidden="true">&larr;</span>
      Back to Services
    </button>

    <div *ngIf="errorMessage" class="message message-error">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="message message-success">
      {{ successMessage }}
    </div>

    <div *ngIf="isLoadingServices" class="loading-services">
      Loading services...
    </div>

    <form *ngIf="!isLoadingServices" class="booking-form" (ngSubmit)="confirmBooking()">
      <label class="form-field">
        <span>Service</span>
        <select name="service" [(ngModel)]="bookingData.serviceId" required>
          <option value="" disabled>Select a service</option>
          <option *ngFor="let service of services" [value]="service.id">
            {{ service.label }}
          </option>
        </select>
      </label>

      <label class="form-field">
        <span>Preferred Date</span>
        <input
          type="date"
          name="preferredDate"
          [(ngModel)]="bookingData.date"
          required
        />
      </label>

      <label class="form-field">
        <span>Notes</span>
        <textarea
          name="notes"
          rows="5"
          placeholder="Add optional notes here..."
          [(ngModel)]="bookingData.notes"
        ></textarea>
      </label>

      <p class="approval-note">Your booking request will be reviewed before approval.</p>

      <button type="submit" class="submit-button" [disabled]="isLoading">
        {{ isLoading ? 'Submitting...' : 'Submit Booking' }}
      </button>
    </form>
  </section>
</div>

<div class="min-h-[calc(100vh-5rem)] bg-white px-4 py-7 md:px-8 md:py-9">
  <div class="mx-auto max-w-[1600px] space-y-6">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
      <h1 class="m-0 text-2xl font-bold leading-tight text-slate-950 md:text-[28px]">
        Manage Services
      </h1>

      <app-add-button
        label="New Service"
        data-testid="add-service-btn"
        (onClick)="openModal()"
      ></app-add-button>
    </div>

    <div
      *ngIf="isLoading"
      class="flex min-h-[320px] flex-col items-center justify-center gap-4 rounded-2xl bg-white shadow-[0_18px_44px_rgba(15,23,42,0.06)]"
    >
      <div class="h-11 w-11 animate-spin rounded-full border-4 border-violet-100 border-t-[#6B3293]"></div>
      <p class="m-0 text-sm font-medium text-slate-500">Loading services...</p>
    </div>

    <div *ngIf="!isLoading" class="mt-10" data-testid="services-table">
      <app-manage-services-table
        [bookings]="services"
        (toggleStatus)="toggleServiceStatus($event)"
      >
      </app-manage-services-table>
    </div>
  </div>
</div>

<app-service-form-modal
  *ngIf="isModalOpen"
  data-testid="service-modal"
  (onClose)="isModalOpen = false"
  (onSave)="saveNewService($event)"
>
</app-service-form-modal>

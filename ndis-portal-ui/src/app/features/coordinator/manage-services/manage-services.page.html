<div class="p-4 md:p-6 space-y-6 max-w-[2560px] mx-auto">
    <div class="flex flex-row items-center justify-between gap-4 w-full">
        <div>
            <h1 class="text-lg md:text-xl font-bold text-slate-900">Registered Services Registry</h1>
        </div>
        <div class="flex flex-col items-end gap-3">
            <button data-testid="add-service-btn" (click)="openModal()" class="px-4 py-2 bg-violet-600 text-white rounded-lg text-sm font-medium hover:bg-violet-700 transition-colors">
                +  New Service
            </button>
            <div class="flex items-center gap-3">
                <select [(ngModel)]="selectedStatusFilter" (change)="filterByStatus()" class="px-3 py-2 border border-slate-200 rounded-lg text-sm text-slate-700 bg-white focus:outline-none focus:ring-2 focus:ring-violet-500">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                    <option value="All">All</option>
                </select>
                <button (click)="refreshServices()" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Refresh
                </button>
            </div>
        </div>

    </div>

    <!-- Loading state -->
    <div *ngIf="isLoading" class="flex flex-col items-center justify-center h-[60vh] gap-4">
        <div class="w-12 h-12 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
        <p class="text-slate-400 font-medium">Loading services...</p>
    </div>

    <!-- Services table -->
    <div *ngIf="!isLoading" data-testid="services-table">
        <app-manage-services-table [bookings]="services"
          (toggleStatus)="toggleServiceStatus($event)">
        </app-manage-services-table>
    </div>
</div>

<!-- Add the Modal Component here -->
<app-service-form-modal *ngIf="isModalOpen" data-testid="service-modal" (onClose)="isModalOpen = false" (onSave)="saveNewService($event)">
</app-service-form-modal>

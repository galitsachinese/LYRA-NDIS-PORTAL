<div class="mx-auto max-w-[2560px] space-y-5 p-4 md:space-y-6 md:p-6 2xl:p-8 min-[3840px]:max-w-[3200px] min-[3840px]:p-12">
  <app-booking-queue-table
    [bookings]="bookings"
    [pagedBookings]="pagedBookings"
    [isLoading]="isLoadingBookings"
    [activeFilterLabel]="activeFilterLabel"
    [selectedFilter]="activeFilter"
    [statusOptions]="statusOptions"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    [pageNumbers]="pageNumbers"
    [showingEnd]="showingEnd"
    (refresh)="refreshBookings()"
    (statusChange)="handleStatusFilter($event)"
    (previousPage)="previousPage()"
    (nextPage)="nextPage()"
    (pageChange)="goToPage($event)"
    (approve)="approveBooking($event)"
    (cancel)="cancelBooking($event)">
  </app-booking-queue-table>
</div>

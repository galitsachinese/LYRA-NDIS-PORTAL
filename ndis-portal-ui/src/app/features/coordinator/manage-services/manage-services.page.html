<div class="p-4 md:p-6 space-y-6 max-w-[2560px] mx-auto">
    <!-- Header Section -->
    <div class="flex flex-col gap-4">
        <div class="flex flex-row items-center justify-between gap-4 w-full">
            <div>
                <h1 class="text-lg md:text-2xl font-bold text-slate-900">Registered Services Registry</h1>
                <p class="text-sm text-slate-500 mt-1">Manage all services and create new ones for your organization</p>
            </div>
        </div>

        <!-- Control Bar -->
        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <!-- Add Service Button - Made Prominent -->
            <app-add-button data-testid="add-service-btn" label="Add New Service" variant="ghost" (onClick)="openModal()"></app-add-button>

            <!-- Filter and Refresh Controls -->
            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                <select [(ngModel)]="selectedStatusFilter" (change)="filterByStatus()" class="px-4 py-2 border border-slate-300 rounded-lg text-sm text-slate-700 bg-white focus:outline-none focus:ring-2 focus:ring-violet-500 hover:border-slate-400 transition-colors">
                    <option value="Active">Active Services</option>
                    <option value="Inactive">Inactive Services</option>
                    <option value="All">All Services</option>
                </select>
                <button (click)="refreshServices()" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg font-medium hover:bg-green-700 transition-colors shadow-sm hover:shadow-md">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
    </div>

    <div *ngIf="errorMessage" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">
        {{ errorMessage }}
    </div>

    <!-- Loading state -->
    <div *ngIf="isLoading" class="flex flex-col items-center justify-center h-[60vh] gap-4">
        <div class="w-12 h-12 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
        <p class="text-slate-400 font-medium">Loading services...</p>
    </div>

    <!-- Services table -->
    <div *ngIf="!isLoading && !errorMessage" data-testid="services-table">
    <app-manage-services-table [bookings]="services"
          (toggleStatus)="toggleServiceStatus($event)"
          (editService)="openEditModal($event)">
        </app-manage-services-table>
    </div>
</div>

<!-- Add New Service Modal -->
<app-service-form-modal *ngIf="isModalOpen" data-testid="service-modal" (onClose)="isModalOpen = false" (onSave)="saveNewService($event)">
</app-service-form-modal>

<!-- Edit Service Modal -->
<app-edit-service-modal *ngIf="isEditModalOpen"
  [service]="selectedServiceForEdit"
  (onClose)="isEditModalOpen = false"
  (onSaved)="loadServices()">
</app-edit-service-modal>

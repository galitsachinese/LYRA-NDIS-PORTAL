<!-- File: src/app/shared/components/sidebar/sidebar.ui.html -->

<aside
  class="h-screen bg-white border-r border-slate-200 flex flex-col p-4 transition-all duration-300 ease-in-out"
  [class.w-64]="!isCollapsed" [class.w-20]="isCollapsed">

  <!-- SIDEBAR HEADER -->
  <div class="flex items-center gap-3 px-2 mb-8 overflow-hidden whitespace-nowrap"
    (click)="isCollapsed ? toggleCollapse() : null" [class.cursor-pointer]="isCollapsed">
    <div
      class="min-w-[32px] h-8 bg-[#6b21a8] text-white rounded-lg flex items-center justify-center font-bold text-[10px]">
      NDIS
    </div>

    <!-- Title only shows when expanded -->
    <div *ngIf="!isCollapsed" class="flex flex-col">
      <span class="font-semibold text-sm text-slate-900">NDIS</span>
      <span class="text-xs text-slate-500">{{ subText }}</span>
    </div>
  </div>

  <!-- NAVIGATION -->
  <nav class="flex flex-col gap-1">
    <a *ngFor="let item of navItems" [routerLink]="item.path" routerLinkActive="bg-[#f3f0ff] text-[#6b21a8] font-medium"
      [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
      #rla="routerLinkActive"
      class="flex items-center rounded-lg px-3 py-2.5 text-slate-500 hover:bg-slate-50 hover:text-slate-900 transition-all group"
      [class.justify-center]="isCollapsed">

      <span *ngIf="!isCollapsed" class="text-sm whitespace-nowrap">
        {{ item.label }}
      </span>
      <span *ngIf="isCollapsed" class="text-sm font-semibold">
        {{ item.label.charAt(0) }}
      </span>
    </a>
  </nav>
</aside>

<div class="min-h-full bg-white px-5 py-8 text-[#18181b] md:px-7 md:py-10">
  <header class="mb-8 flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
    <h1 class="m-0 text-[28px] font-extrabold">My Bookings</h1>
    <app-status-dropdown class="w-full md:w-auto" [activeStatus]="activeFilter"
      (statusChange)="handleStatusFilter($event)"></app-status-dropdown>
  </header>

  <section class="grid grid-cols-1 gap-3 md:grid-cols-[1fr_auto] items-start">

    <!-- TABLE SECTION: always rendered, states toggle inside -->
    <section class="relative min-h-[300px] rounded-[14px] bg-white overflow-hidden">

      <!-- Loading overlay -->
      <div *ngIf="isLoading"
        class="absolute inset-0 z-20 flex items-center justify-center bg-white/60 backdrop-blur-[1px] font-extrabold text-[#6f2da8]">
        Updating...
      </div>

      <!-- Empty state -->
      <div *ngIf="!isLoading && bookings.length === 0"
        class="flex h-[300px] flex-col items-center justify-center text-center text-slate-500">
        <p class="text-lg font-medium text-slate-900">No bookings found</p>
        <p class="mt-1 text-sm text-slate-400">Try changing your filter.</p>
      </div>

      <!-- Table: hidden during load/empty but section stays mounted -->
      <div *ngIf="!isLoading && bookings.length > 0" class="w-full">
        <app-booking-table [bookings]="bookings" [currentFilter]="activeFilter" (viewBooking)="handleView($event)"
          (cancelBooking)="handleCancel($event)">
        </app-booking-table>
      </div>

      <div class="border-t border-slate-100 px-4 py-3 bg-slate-50 text-xs text-slate-500 rounded-b-[14px]">
        Showing {{ bookings.length }} of {{ totalItems }} bookings
      </div>
    </section>

    <!-- SIDEBAR: no longer wrapped in the conditional, always visible -->
    <aside class="hidden md:block w-[240px] border border-slate-200 rounded-[14px] bg-white px-4 py-4 shadow-sm">
      <span class="mb-2 block text-[9px] font-extrabold uppercase text-[#807789]">Next Session</span>
      <strong class="block text-xs font-extrabold text-slate-900">{{ nextSessionLabel || 'No sessions' }}</strong>
    </aside>

  </section>
</div>

<div class="p-4 md:p-8 space-y-8 max-w-[2560px] mx-auto">

    <header class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
        <div class="flex flex-col gap-4">
            <h1 class="text-2xl font-bold text-slate-900">Our Services</h1>
        
            <div class="flex items-center">
                <app-filter-bar *ngIf="categoryOptions.length > 0" [categoryOptions]="categoryOptions"
                    [selectedValue]="selectedCategory" (select)="handleCategoryFilter($event)">
                </app-filter-bar>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button (click)="openAiRecommendation()"
                class="flex items-center gap-2 rounded-full bg-[#6F2C91] px-4 py-2 text-xs font-medium text-white transition-all hover:bg-[#5a2375]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" />
                </svg>
                Service Recommendation
            </button>
        </div>
    </header>
    

    <div *ngIf="isPublicView"
        class="bg-purple-50 border border-purple-100 p-4 rounded-xl text-sm text-purple-800 text-center">
        Browsing as guest. <a routerLink="/login" class="font-bold underline">Login</a> to book these services.
    </div>

    <main>
        <div *ngIf="isLoading" class="grid grid-cols-1 md:grid-cols-3">
            <div *ngFor="let i of [1,2,3]" class="h-64 bg-slate-100 animate-pulse rounded-2xl"></div>
        </div>

    <app-service-card-component *ngIf="!isLoading" [services]="filteredServices"
            (cardSelected)="onCardClick($event)">
        </app-service-card-component>
    </main>

    <!-- Service Recommendation Modal -->
    <app-service-recommendation-modal></app-service-recommendation-modal>
</div>

<!-- Auth Modal: appears when unauthenticated user clicks a service card on protected route -->
<app-auth-modal *ngIf="showAuthModal"
                [serviceId]="pendingServiceId"
                (close)="closeAuthModal()"
                (loginSuccess)="onAuthSuccess()">
</app-auth-modal>

<div class="min-h-full bg-[#fff7fd] p-5 pt-9 text-[#18181b] md:p-7 md:pt-10">
  <header class="mb-6 flex items-center justify-between gap-5 max-md:flex-col max-md:items-stretch">
    <h1 class="m-0 text-[28px] font-extrabold leading-tight">My Bookings</h1>

    <aside
      class="min-w-[146px] rounded-[14px] bg-white px-4 py-3.5 shadow-[0_14px_34px_#77488914] max-md:w-full"
      aria-label="Next session"
    >
      <span class="mb-2 block text-[9px] font-extrabold uppercase tracking-[1.4px] text-[#807789]">
        Next Session
      </span>
      <strong class="block text-xs font-extrabold">{{ nextSessionLabel }}</strong>
    </aside>
  </header>

  <div *ngIf="errorMessage" class="mb-[18px] rounded-xl bg-white px-4 py-3.5 text-[#b91c1c]">
    {{ errorMessage }}
  </div>

  <section class="mb-3 flex items-center justify-between gap-5 max-md:flex-col max-md:items-stretch">
    <h2 class="m-0 text-base font-extrabold">Scheduled Care Plan</h2>

    <app-status-dropdown
      class="bookings-filter"
      [activeStatus]="activeFilter"
      (statusChange)="handleStatusFilter($event)"
    >
    </app-status-dropdown>
  </section>

  <div
    *ngIf="!isLoading && !errorMessage && bookings.length === 0"
    class="mb-[18px] rounded-xl bg-white px-4 py-3.5 text-center text-slate-500"
  >
    <p class="m-0">No bookings found</p>
  </div>

  <section
    class="bookings-table-shell relative overflow-visible rounded-[14px] bg-white shadow-[0_16px_38px_#7748890f]"
    *ngIf="bookings.length > 0"
  >
    <div
      *ngIf="isLoading"
      class="absolute inset-0 z-10 grid place-items-center rounded-[14px] bg-white/70 text-xs font-extrabold uppercase tracking-wider text-[#6f2da8]"
    >
      Updating...
    </div>

    <app-booking-table
      [bookings]="bookings"
      [currentFilter]="activeFilter"
      (viewBooking)="handleView($event)"
      (cancelBooking)="handleCancel($event)"
    >
    </app-booking-table>

    <p class="m-0 px-0.5 py-1 text-xs text-[#25202b]">
      Showing {{ bookings.length }} of {{ totalItems }} bookings
    </p>
  </section>

  <div class="flex justify-center pt-4" *ngIf="totalPages > 1">
    <app-pagination
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      (pageChange)="handlePageChange($event)"
    >
    </app-pagination>
  </div>

  <app-cancel-dialog
    [isOpen]="isCancelDialogOpen"
    label="Are you sure you want to cancel this booking?"
    confirmText="Yes, Cancel Booking"
    (closed)="closeCancelDialog()"
    (confirmed)="confirmCancellation()"
  >
    <div body class="space-y-4">
      <p class="text-slate-900 font-semibold text-sm 2xl:text-2xl">
        You will permanently cancel this scheduled booking.
      </p>
    </div>
  </app-cancel-dialog>
</div>

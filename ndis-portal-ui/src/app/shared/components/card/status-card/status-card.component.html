<div class="status-card" [style.background-color]="bgColor">
  <div class="card-content">
    <div class="icon-container" [style.color]="iconColor">
      <i [class]="iconClass"></i>
    </div>
    <div class="text-content">
      <p class="value">{{ value }}</p>
      <p class="label">{{ label }}</p>
    </div>
  </div>
</div>

<app-dialog-ui label="Edit Service" [isOpen]="true" (close)="close()">
  <div body class="space-y-5">
    <p class="m-0 text-sm text-slate-500">
      Update the service details below. Changes will be applied immediately.
    </p>

    <div *ngIf="errorMessage" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-xs font-medium text-red-700">
      {{ errorMessage }}
    </div>

    <!-- Service Name -->
    <label class="block">
      <span class="mb-2 block text-xs font-bold text-slate-700">
        Service Name <span class="text-red-500">*</span>
      </span>
      <input
        type="text"
        [(ngModel)]="name"
        placeholder="e.g. Community Access Assistance"
        class="h-11 w-full rounded-lg border border-slate-300 px-3 text-sm outline-none transition focus:border-[#6B3293] focus:ring-2 focus:ring-violet-100"
      />
    </label>

    <!-- Category -->
    <label class="block">
      <span class="mb-2 block text-xs font-bold text-slate-700">
        Category <span class="text-red-500">*</span>
      </span>
      <select
        [(ngModel)]="category"
        class="h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm outline-none transition focus:border-[#6B3293] focus:ring-2 focus:ring-violet-100"
      >
        <option value="" disabled>Select a service category</option>
        <option *ngFor="let cat of categories" [value]="cat.id">
          {{ cat.name || cat.title }}
        </option>
      </select>
    </label>

    <!-- Description -->
    <label class="block">
      <span class="mb-2 block text-xs font-bold text-slate-700">Description</span>
      <textarea
        [(ngModel)]="description"
        rows="4"
        placeholder="Provide a detailed overview of the service."
        class="w-full resize-none rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-[#6B3293] focus:ring-2 focus:ring-violet-100"
      ></textarea>
    </label>
  </div>

  <!-- Delete Confirmation Overlay -->
  <div *ngIf="showDeleteConfirm" class="absolute inset-0 z-10 flex items-center justify-center bg-black/40 rounded-lg">
    <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 space-y-4">
      <h3 class="text-lg font-bold text-slate-900">Delete Service</h3>
      <p class="text-sm text-slate-500">
        Are you sure you want to delete <strong>{{ name }}</strong>? This action cannot be undone.
      </p>
      <div *ngIf="deleteError" class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-xs text-red-700">
        {{ deleteError }}
      </div>
      <div class="flex gap-3 justify-end">
        <button type="button" (click)="cancelDelete()"
                class="rounded-md border border-slate-200 px-4 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-50 transition">
          Cancel
        </button>
        <button type="button" (click)="deleteService()" [disabled]="isDeleting"
                class="rounded-md bg-red-600 px-4 py-2 text-xs font-bold text-white hover:bg-red-700 transition disabled:opacity-50">
          {{ isDeleting ? 'Deleting...' : 'Delete' }}
        </button>
      </div>
    </div>
  </div>

  <div actions class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row">
    <!-- Delete Button (left side) -->
    <button
      type="button"
      (click)="confirmDelete()"
      class="order-3 sm:order-1 rounded-md border border-red-200 px-4 py-2 text-xs font-semibold text-red-600 transition hover:bg-red-50"
    >
      Delete Service
    </button>

    <!-- Cancel Button -->
    <button
      type="button"
      (click)="close()"
      class="order-2 rounded-md border border-violet-200 px-4 py-2 text-xs font-semibold text-violet-700 transition hover:bg-violet-50 sm:order-2"
    >
      Cancel
    </button>

    <!-- Save Button -->
    <button
      type="button"
      (click)="save()"
      [disabled]="isSaving || !name.trim()"
      class="order-1 sm:order-3 rounded-lg bg-[#6B3293] px-6 py-2 text-xs font-bold text-white shadow-md transition-all hover:bg-[#5a2a7b] active:scale-95 disabled:cursor-not-allowed disabled:opacity-70"
    >
      {{ isSaving ? 'Saving...' : 'Save Changes' }}
    </button>
  </div>
</app-dialog-ui>

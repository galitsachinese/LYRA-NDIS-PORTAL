<nav [ngClass]="useTransparentBg ? 'bg-transparent' : 'bg-[#6F2C91] shadow-md'"
    class="fixed top-0 w-full z-50 h-20 px-4 md:px-12 flex items-center justify-between text-white transition-all duration-300">

    <!-- LEFT SIDE -->
    <div class="flex items-center gap-3">

        <!-- BURGER (mobile only) -->
        <button (click)="toggleMobileMenu()" class="md:hidden p-2">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>

        <!-- LOGO (desktop only) -->
        <div routerLink="/" class="hidden md:flex cursor-pointer items-center gap-2">
            <div
                class="w-7 h-7 rounded-full bg-white flex items-center justify-center text-[#6F2C91] text-[10px] font-bold">
                NDIS
            </div>
            <span class="font-medium tracking-wider">NDIS Portal</span>
        </div>

        <!-- MOBILE LABEL (visible only on mobile) -->
        <div routerLink="/" class="md:hidden flex cursor-pointer items-center gap-2">
            <span class="font-medium tracking-wider">NDIS</span>
        </div>

    </div>

    <!-- DESKTOP NAV LINKS -->
    <div class="hidden md:flex gap-8 font-base text-sm">
        <a *ngFor="let link of navLinks" [routerLink]="link.path" routerLinkActive="font-bold border-b-2 border-white"
            class="py-1">
            {{ link.label }}
        </a>
    </div>

    <!-- DESKTOP AUTH -->
    <div class="hidden md:block">
        <button *ngIf="!authService.isAuthenticated()" routerLink="/login"
            class="border border-white/40 px-6 py-2 rounded-full text-xs uppercase hover:bg-white/10 transition-all">
            Login
        </button>

        <button *ngIf="authService.isAuthenticated()" (click)="logout()"
            class="border border-white/40 px-6 py-2 rounded-full text-xs uppercase hover:bg-white/10 transition-all">
            Logout
        </button>
    </div>

    <!-- MOBILE MENU -->
    <div class="absolute top-16 left-0 w-full bg-[#6F2C91] transition-all overflow-hidden md:hidden"
        [ngClass]="isMobileMenuOpen ? 'max-h-screen opacity-100' : 'max-h-0 opacity-0'">

        <div class="px-6 py-6 flex flex-col gap-4 text-sm">

            <a *ngFor="let link of navLinks" [routerLink]="link.path" (click)="toggleMobileMenu()">
                {{ link.label }}
            </a>

            <button (click)="authService.isAuthenticated() ? logout() : null; toggleMobileMenu()"
                [routerLink]="!authService.isAuthenticated() ? '/login' : null"
                class="mt-4 w-full bg-white text-[#6F2C91] py-3 rounded-full font-bold">

                {{ authService.isAuthenticated() ? 'Logout' : 'Login' }}
            </button>

        </div>
    </div>

</nav>

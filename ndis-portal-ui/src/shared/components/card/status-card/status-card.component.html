<div
    [style.backgroundColor]="bgColor"
    class="flex items-center justify-between rounded-xl border border-slate-200 p-5 shadow-sm transition-shadow duration-300 hover:shadow-md md:p-6 2xl:p-8 min-[3840px]:p-12">
    <div class="space-y-1 2xl:space-y-2 min-[3840px]:space-y-4">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500 2xl:text-base min-[3840px]:text-2xl">
            {{ label }}
        </p>
        <p class="text-2xl font-bold text-slate-900 2xl:text-4xl min-[3840px]:text-6xl">
            {{ value | number }}
        </p>
    </div>
    <div *ngIf="iconClass" class="flex items-center justify-center">
        <svg [class]="iconClass" [attr.fill]="iconColor" viewBox="0 0 24 24">
            <ng-container [ngSwitch]="label">
                <path *ngSwitchCase="'TOTAL BOOKINGS'" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                <path *ngSwitchCase="'PENDING APPROVAL'" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                <path *ngSwitchCase="'APPROVED'" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                <path *ngSwitchCase="'CANCELLATIONS'" d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/>
                <path *ngSwitchDefault d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </ng-container>
        </svg>
    </div>
</div>

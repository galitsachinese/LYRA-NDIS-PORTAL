<div class="group relative overflow-hidden rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">

    <!-- Accent Line -->
    <div class="absolute inset-x-0 top-0 h-1" [style.background]="accentColor">
    </div>

    <div class="flex items-start justify-between">

        <div>

            <p class="text-[10px] md:text-xs font-semibold uppercase tracking-wider text-slate-400">
                {{ label }}
            </p>

            <p class="mt-2 text-2xl font-bold" [style.color]="valueColor">

                {{ value | number }}

            </p>

        </div>

        <div class="flex h-10 w-10 items-center justify-center rounded-xl" [style.background]="iconBackground">

            <svg class="h-5 w-5" viewBox="0 0 24 24" [attr.fill]="iconColor">

                <path [attr.d]="iconPath"></path>

            </svg>

        </div>

    </div>

</div>

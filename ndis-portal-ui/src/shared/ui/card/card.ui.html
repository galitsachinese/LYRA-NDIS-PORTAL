<div class="card-container">
    <div class="icon-header">
        <div class="icon-circle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5D3A89" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 1.85 8.2a7 7 0 0 1-9.85 9.8z"></path>
                <path d="M11 20l3-3"></path>
            </svg>
        </div>
    </div>

    <div class="card-content">
        <h2 class="card-title">{{ title }}</h2>
        <p class="card-description">{{ description }}</p>
    </div>

    <div class="card-footer">
        <span class="card-tag">{{ tag }}</span>

        <button class="arrow-button" aria-label="Next">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7B8DA0" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>
</div>

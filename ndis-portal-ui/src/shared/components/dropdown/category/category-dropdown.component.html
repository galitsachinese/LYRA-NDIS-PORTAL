<div class="filter-section" role="group" aria-label="Filter services by category">
  <button
    *ngFor="let option of categoryOptions; trackBy: trackByValue"
    type="button"
    class="category-filter-btn"
    [class.active]="selectedValue === option.value"
    (click)="handleSelect(option.value)"
    data-testid="category-filter-btn"
  >
    {{ option.label }}
  </button>
</div>

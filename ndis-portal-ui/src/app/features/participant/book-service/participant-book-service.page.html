<div class="flex min-h-screen w-full flex-col items-center justify-center bg-slate-50 p-6">
  <header class="mb-8 w-full max-w-[680px]">
    <h1 class="text-4xl font-extrabold tracking-tight text-slate-950">Book a Service</h1>
    <p class="mt-2 text-slate-500">Select a service and preferred date to submit your booking request.</p>
  </header>

  <section
    class="w-full max-w-[680px] rounded-3xl border border-slate-100 bg-white p-8 shadow-[0_20px_50px_rgba(0,0,0,0.05)]"
    aria-label="Book a service form">
    <!-- Back Button -->
    <button type="button"
      class="mb-6 inline-flex items-center gap-2 text-sm font-bold text-violet-700 hover:text-violet-800 transition"
      (click)="navBack()">
      <span aria-hidden="true">&larr;</span> Back to Services
    </button>

    <!-- Error/Loading States -->
    <div *ngIf="errorMessage"
      class="mb-6 rounded-xl bg-red-50 p-4 text-sm text-red-700 border border-red-100 flex items-center gap-3">
      <span class="font-bold">⚠️</span> {{ errorMessage }}
    </div>

    <div *ngIf="isLoadingServices" class="flex items-center justify-center py-12 gap-3">
      <div class="h-6 w-6 animate-spin rounded-full border-4 border-violet-100 border-t-violet-600"></div>
      <span class="text-sm font-medium text-slate-500">Loading your services...</span>
    </div>

    <!-- Main Form -->
    <form *ngIf="!isLoadingServices" class="space-y-6" (ngSubmit)="submitBooking()">

      <!-- Input Field Component Logic -->
      <div class="grid gap-6">
        <label class="block">
          <span class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-400">Service</span>
          <select name="serviceId"
            class="h-12 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-slate-900 outline-none focus:ring-2 focus:ring-violet-200 focus:border-violet-400 transition"
            [(ngModel)]="bookingForm.serviceId" [disabled]="isSubmitting" required>
            <option value="" disabled>Select a service</option>
            <option *ngFor="let service of services" [value]="service.id">{{ service.label }}</option>
          </select>
        </label>

        <label class="block">
          <span class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-400">Preferred Date</span>
          <input type="date" name="preferredDate"
            class="h-12 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-slate-900 outline-none focus:ring-2 focus:ring-violet-200 focus:border-violet-400 transition"
            [(ngModel)]="bookingForm.preferredDate" [disabled]="isSubmitting" required />
        </label>

        <label class="block">
          <span class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-400">Notes (Optional)</span>
          <textarea name="notes" rows="4" placeholder="How can we help you?"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 p-4 text-slate-900 outline-none focus:ring-2 focus:ring-violet-200 focus:border-violet-400 transition resize-none"
            [(ngModel)]="bookingForm.notes" [disabled]="isSubmitting"></textarea>
        </label>
      </div>

      <!-- Info Banner -->
      <div class="rounded-xl bg-violet-50 p-4 text-sm leading-relaxed text-violet-900 border border-violet-100">
        <span class="font-bold">Note:</span> Your request will be reviewed by our scheduling team before confirmation.
      </div>

      <!-- Submit Button -->
      <button type="submit"
        class="h-12 w-full sm:w-auto rounded-xl bg-violet px-8 font-bold text-white shadow-lg shadow-violet-200 hover:bg-violet-700 transition active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="isSubmitting">
        {{ isSubmitting ? 'Processing...' : 'Submit Request' }}
      </button>
    </form>
  </section>
</div>

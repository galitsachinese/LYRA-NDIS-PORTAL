<section class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-start max-w-7xl mx-auto py-12">

    <!-- LEFT HEADER -->
    <div class="lg:col-span-4 text-center lg:text-left">
        <h2 class="text-2xl md:text-6xl font-semibold text-violet">
            Frequently Asked Questions
        </h2>
    </div>

    <!-- RIGHT CONTENT -->
    <div class="lg:col-span-8 space-y-6 w-full">

        <div *ngFor="let faq of faqs; let i = index" class="relative">

            <!-- PILL BUTTON -->
            <button (click)="toggleFaq(i)"
                class="w-full flex justify-between items-center px-6 py-4 text-left text-xs md:text-sm font-medium transition-all duration-300 border bg-white z-10 relative"
                [ngClass]="faq.open
                    ? 'rounded-full border-purple-200 shadow-lg'
                    : 'rounded-full border-gray-100 shadow-xs'">

                <span class="pr-4" [ngClass]="faq.open ? 'text-[#6F2C91] font-semibold' : 'text-gray-700'">
                    {{ faq.question }}
                </span>

                <svg class="w-4 h-4 flex-shrink-0 transform transition-transform duration-300"
                    [class.rotate-180]="faq.open" [class.text-[#6F2C91]]="faq.open" [class.text-gray-400]="!faq.open"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>

            </button>

            <!-- GAP FIX: proper spacing instead of negative margins -->
            <div class="transition-all duration-300 ease-in-out overflow-hidden"
                [ngClass]="faq.open ? 'max-h-48 opacity-100 mt-3' : 'max-h-0 opacity-0 mt-0'">

                <div class="bg-white border border-purple-100 rounded-2xl px-6 py-5 shadow-lg">

                    <p class="text-xs text-gray-500 leading-relaxed">
                        {{ faq.answer }}
                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

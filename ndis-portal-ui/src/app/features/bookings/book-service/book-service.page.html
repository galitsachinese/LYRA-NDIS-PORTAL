<div class="min-h-screen w-full flex items-center justify-center bg-slate-50 p-4">
    <div class="w-full max-w-xl">

    <header class="mb-8 text-center">
      <div
        class="mx-auto w-12 h-12 bg-violet-600 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-violet-200">
        <svg class="text-white w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-900">Book Your Session</h1>
      <p class="mt-2 text-slate-500">Provide the details below to request your care visit.</p>
    </header>

    <section class="rounded-3xl border border-slate-200 bg-white p-6 sm:p-10 shadow-xl shadow-slate-200/50">

      <div *ngIf="errorMessage"
        class="mb-6 flex items-center gap-3 rounded-xl bg-red-50 border border-red-100 p-4 text-sm text-red-700">
        <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" />
        </svg>
        {{ errorMessage }}
      </div>

      <form *ngIf="!isLoadingServices" class="space-y-6">

        <div class="space-y-4">
          <app-select-service [options]="services" [(value)]="bookingData.serviceId"
            [disabled]="isSubmitting"></app-select-service>
          <app-date-picker-component [(value)]="bookingData.date" [disabled]="isSubmitting"></app-date-picker-component>
          <app-text-area-component [rows]="3" [(value)]="bookingData.notes" [disabled]="isSubmitting"
            label="Additional Notes (Optional)"></app-text-area-component>
        </div>

        <div class="bg-slate-50 rounded-xl p-4 flex gap-3 items-start border border-slate-100">
          <svg class="w-5 h-5 text-slate-400 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p class="text-xs text-slate-600 leading-relaxed">Your request will be reviewed by our scheduling team. You
            will receive a confirmation email once approved.</p>
        </div>

        <div class="flex items-center gap-3 pt-4">
          <app-back-button (onClick)="navBack()" class="flex-1"></app-back-button>
          <app-book-button (onClick)="confirmBooking()" class="flex-[2]"
            [disabled]="isSubmitting || !bookingData.serviceId || !bookingData.date" [isLoading]="isSubmitting">
          </app-book-button>
        </div>

      </form>

      <div *ngIf="isLoadingServices" class="py-12 flex flex-col items-center justify-center gap-3">
        <div class="w-8 h-8 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
        <p class="text-sm font-medium text-slate-400">Loading your services...</p>
      </div>
    </section>
  </div>
</div>

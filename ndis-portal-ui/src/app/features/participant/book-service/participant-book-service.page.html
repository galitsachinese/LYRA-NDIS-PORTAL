<div class="p-4 md:p-6 max-w-[2560px] mx-auto">
  <header class="mb-6">
    <h1 class="m-0 text-[30px] font-extrabold leading-tight text-slate-950">
      Book a Service
    </h1>
    <p class="mt-2 text-sm text-slate-500">
      Select a service and preferred date to submit your booking request.
    </p>
  </header>

  <section
    class="w-full max-w-[680px] rounded-[18px] border border-[#f3edf7] bg-white p-6 shadow-[0_18px_42px_rgba(119,72,137,0.08)]"
    aria-label="Book a service form"
  >
    <button
      type="button"
      class="mb-4 inline-flex items-center gap-1.5 text-xs font-extrabold text-[#6B3293]"
      (click)="navBack()"
    >
      <span aria-hidden="true">&larr;</span>
      Back to Services
    </button>

    <div
      *ngIf="errorMessage"
      data-testid="error-message"
      class="mb-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700"
    >
      {{ errorMessage }}
    </div>

    <div *ngIf="isLoadingServices" class="flex items-center gap-3 py-6">
      <div class="h-6 w-6 animate-spin rounded-full border-4 border-violet-100 border-t-violet-600"></div>
      <span class="text-sm text-slate-500">Loading services...</span>
    </div>

    <div *ngIf="isSubmitting" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4">
      <div class="flex w-full max-w-sm flex-col items-center gap-4 rounded-lg bg-white p-6 text-center shadow-xl">
        <div class="h-8 w-8 animate-spin rounded-full border-4 border-violet-100 border-t-violet-600"></div>
        <p class="m-0 font-semibold text-slate-700">Loading</p>
        <p class="m-0 text-sm text-slate-500">Please wait while we process your request</p>
      </div>
    </div>

    <form *ngIf="!isLoadingServices" class="space-y-4" (ngSubmit)="submitBooking()">
      <label class="block">
        <span class="mb-2 block text-xs font-extrabold text-slate-950">
          Service
        </span>
        <select
          data-testid="service-select"
          name="serviceId"
          class="h-11 w-full rounded-[10px] border-0 bg-[#f4eef7] px-4 text-xs text-slate-800 outline-none focus:ring-2 focus:ring-violet-100"
          [(ngModel)]="bookingForm.serviceId"
          [disabled]="isSubmitting"
          required
        >
          <option value="" disabled>Select a service</option>
          <option *ngFor="let service of services" [value]="service.id">
            {{ service.label }}
          </option>
        </select>
        <div *ngIf="hasError('serviceId')" class="mt-1 text-sm text-red-500">
          {{ getError('serviceId') }}
        </div>
      </label>

      <label class="block">
        <span class="mb-2 block text-xs font-extrabold text-slate-950">
          Preferred Date
        </span>
        <input
          data-testid="date-input"
          type="date"
          name="preferredDate"
          class="h-11 w-full rounded-[10px] border-0 bg-[#f4eef7] px-4 text-xs text-slate-800 outline-none focus:ring-2 focus:ring-violet-100"
          [(ngModel)]="bookingForm.preferredDate"
          [disabled]="isSubmitting"
          required
        />
        <div *ngIf="hasError('preferredDate')" class="mt-1 text-sm text-red-500">
          {{ getError('preferredDate') }}
        </div>
      </label>

      <label class="block">
        <span class="mb-2 block text-xs font-extrabold text-slate-950">
          Notes
        </span>
        <textarea
          data-testid="notes-input"
          name="notes"
          rows="5"
          placeholder="Add optional notes here..."
          class="min-h-[118px] w-full resize-y rounded-[10px] border-0 bg-[#f4eef7] px-4 py-3 text-xs text-slate-800 outline-none placeholder:text-slate-500 focus:ring-2 focus:ring-violet-100"
          [(ngModel)]="bookingForm.notes"
          [disabled]="isSubmitting"
        ></textarea>
      </label>

      <p class="m-0 rounded-[9px] bg-[#efe5f8] px-3 py-2 text-xs leading-5 text-[#7a5894]">
        Your booking request will be reviewed before approval.
      </p>

      <button
        type="submit"
        data-testid="submit-btn"
        class="mt-1 min-h-[42px] w-[170px] rounded-[9px] bg-[#a97bea] px-5 text-xs font-extrabold text-white transition disabled:cursor-not-allowed disabled:opacity-60 max-sm:w-full"
        [disabled]="isSubmitting"
      >
        {{ isSubmitting ? 'Submitting...' : 'Submit Booking' }}
      </button>
    </form>
  </section>
</div>

<section
    class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16 items-start max-w-7xl mx-auto px-4 md:px-12 py-12 md:py-20">

    <div class="lg:col-span-5 space-y-6 text-center md:text-left">
        <h2 class="text-2xl md:text-3xl font-medium text-gray-900">Get In Touch With Us</h2>

        <div *ngFor="let item of contactInfo" class="flex items-center gap-4 p-4">
        
            <div [ngSwitch]="item.type" class="flex-shrink-0">
                <app-map-icon *ngSwitchCase="'map'" class="text-[#6F2C91]"></app-map-icon>
                <app-phone-icon *ngSwitchCase="'phone'" class="text-[#6F2C91]"></app-phone-icon>
                <app-message-icon *ngSwitchCase="'email'" class="text-[#6F2C91]"></app-message-icon>
                <app-hour-icon *ngSwitchCase="'clock'" class="text-[#6F2C91]"></app-hour-icon>
            </div>
        
            <div class="flex flex-col justify-center text-xs md:text-sm">
                <p class="font-medium text-gray-800 leading-tight">{{ item.value }}</p>
                <p *ngIf="item.extra" class="text-gray-500 text-[11px] mt-0.5 leading-tight">{{ item.extra }}</p>
            </div>
        </div>
    </div>

    <div class="lg:col-span-7 space-y-6 text-center md:text-left">
        <h3 class="text-2xl md:text-3xl font-medium text-gray-900">Send Us a Message</h3>
        <div class="w-full bg-white">
            <form class="space-y-4 text-left">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" placeholder="First Name"
                        class="w-full px-4 py-3 bg-purple-50/30 rounded-full border border-gray-100 text-xs focus:outline-none focus:border-purple-300 focus:bg-white transition-all">
                    <input type="text" placeholder="Last Name"
                        class="w-full px-4 py-3 bg-purple-50/30 rounded-full border border-gray-100 text-xs focus:outline-none focus:border-purple-300 focus:bg-white transition-all">
                </div>
                <input type="email" placeholder="Email"
                    class="w-full px-4 py-3 bg-purple-50/30 rounded-full border border-gray-100 text-xs focus:outline-none focus:border-purple-300 focus:bg-white transition-all">
                <input type="text" placeholder="Phone"
                    class="w-full px-4 py-3 bg-purple-50/30 rounded-full border border-gray-100 text-xs focus:outline-none focus:border-purple-300 focus:bg-white transition-all">
                <textarea rows="4" placeholder="Message"
                    class="w-full px-4 py-3 bg-purple-50/30 rounded-xl border border-gray-100 text-xs focus:outline-none focus:border-purple-300 focus:bg-white transition-all resize-none"></textarea>
                <button type="submit"
                    class="w-full bg-[#6F2C91] text-white py-3 rounded-full font-semibold text-xs tracking-wider hover:bg-[#5a2375] transition-all shadow-sm uppercase">
                    Send
                </button>
            </form>
        </div>
    </div>
</section>

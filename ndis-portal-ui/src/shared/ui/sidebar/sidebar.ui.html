<aside class="sidebar">
  <div class="brand">
    <div class="logo-box">
      <span>NDIS</span>
    </div>
    <div class="brand-text">
      <span class="company-name">NDIS</span>
      <span class="sub-text">{{ subText }}</span>
    </div>
  </div>

  <nav class="nav-menu">
    <a *ngFor="let item of navItems" [routerLink]="item.path" routerLinkActive="active" class="nav-link">

      <div class="icon-wrapper">
        <ng-container [ngSwitch]="item.icon">
          <app-icon-home *ngSwitchCase="'home'" [size]="20"></app-icon-home>
          <app-icon-service *ngSwitchCase="'services'" [size]="20"></app-icon-service>
          <app-icon-book *ngSwitchCase="'bookings'" [size]="20"></app-icon-book>
        </ng-container>
      </div>

      <span class="label">{{ item.label }}</span>
    </a>
  </nav>
</aside>

<div class="mx-auto max-w-[2560px] space-y-5 p-4 md:space-y-6 md:p-6 2xl:p-8 min-[3840px]:max-w-[3200px] min-[3840px]:p-12">
  <section class="min-w-0">
  
    <div *ngIf="isLoading" class="flex h-40 flex-col items-center justify-center gap-4">
  
      <div class="h-8 w-8 animate-spin rounded-full border-4 border-violet-100 border-t-violet-600">
      </div>
  
      <p class="text-sm font-medium text-slate-400">
        Loading stats...
      </p>
  
    </div>
  
    <!-- Status Cards Grid: Fixed - removed nested grid that was causing cards to shrink -->
    <div *ngIf="!isLoading" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <app-status-card-component 
        *ngFor="let stat of stats" 
        [label]="stat.label" 
        [value]="stat.value" 
        [accentColor]="stat.accentColor"
        [valueColor]="stat.valueColor" 
        [iconBackground]="stat.iconBackground" 
        [iconColor]="stat.iconColor"
        [iconPath]="stat.iconPath">
      </app-status-card-component>
    </div>
  
  </section>

  <!-- Booking Queue Header -->
  <div class="mb-6 flex items-center justify-between">
    <h2 class="text-lg font-bold text-slate-950 2xl:text-2xl min-[3840px]:text-4xl">
      Booking Queue
    </h2>
  
    <div class="flex items-center gap-2 2xl:gap-3 min-[3840px]:gap-5">
  
      <!-- Status Filter -->
      <div class="relative" data-testid="status-filter">
        <button type="button" (click)="toggleFilterDropdown()"
          class="inline-flex h-9 items-center gap-1.5 rounded-md bg-white px-2.5 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 transition-colors hover:bg-slate-50 2xl:h-11 2xl:px-4 2xl:text-base min-[3840px]:h-16 min-[3840px]:gap-2.5 min-[3840px]:px-6 min-[3840px]:text-2xl">
  
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h12M4 12h8M4 17h4" />
          </svg>
  
          <span>Status</span>
  
          <svg class="h-3.5 w-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m6 9 6 6 6-6" />
          </svg>
        </button>
  
        <div *ngIf="isFilterDropdownOpen"
          class="absolute right-0 top-full z-50 mt-2 w-40 overflow-hidden rounded-lg border border-slate-200 bg-white shadow-lg">
  
          <button *ngFor="let option of statusOptions" type="button" (click)="selectStatus(option.value)"
            class="block w-full px-4 py-2 text-left text-sm hover:bg-slate-50" [ngClass]="{
              'bg-slate-50 font-semibold text-slate-900':
                selectedFilter === option.value
            }">
  
            {{ option.label }}
  
          </button>
        </div>
      </div>
  
      <!-- Refresh -->
      <button type="button" (click)="refreshBookings()"
        class="inline-flex h-9 items-center gap-2 rounded-md bg-green-600 px-4 text-sm font-semibold text-white shadow-sm transition hover:bg-green-700">
  
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 0 0 4.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 0 1-15.357-2m15.357 2H15" />
        </svg>
  
        Refresh
      </button>
  
    </div>
  </div>
  <app-booking-queue-table
    [bookings]="filteredBookings"
    [pagedBookings]="pagedBookings"
    [isLoading]="isLoadingBookings"
    [activeFilterLabel]="activeFilterLabel"
    [selectedFilter]="selectedFilter"
    [statusOptions]="statusOptions"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    [pageNumbers]="pageNumbers"
    [showingEnd]="showingEnd"
    [showActions]="false"
    (refresh)="refreshBookings()"
    (statusChange)="filterByStatus($event)"
    (previousPage)="previousPage()"
    (nextPage)="nextPage()"
    (pageChange)="goToPage($event)"
    (approve)="requestApproveBooking($event)"
    (cancel)="requestCancelBooking($event)">
    
  </app-booking-queue-table>

  <app-dialog-ui
    [isOpen]="!!pendingAction"
    [label]="confirmationTitle"
    (close)="closeActionConfirmation()"
  >
    <div body class="space-y-3">
      <p class="m-0 text-sm font-medium text-slate-900 2xl:text-xl">
        {{ confirmationMessage }}
      </p>
      <p class="m-0 text-sm text-slate-500 2xl:text-lg">
        Please confirm before this booking status is updated.
      </p>
    </div>

    <div actions class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row">
      <button
        type="button"
        (click)="closeActionConfirmation()"
        [disabled]="isUpdatingBooking"
        class="order-2 rounded-md border border-violet-200 px-4 py-2 text-xs font-semibold text-violet-700 transition hover:bg-violet-50 disabled:cursor-not-allowed disabled:opacity-60 sm:order-1 2xl:text-xl"
      >
        Dismiss
      </button>

      <button
        type="button"
        (click)="confirmBookingAction()"
        [disabled]="isUpdatingBooking"
        class="order-1 rounded-lg bg-[#6B3293] px-6 py-2 text-xs font-bold text-white shadow-md transition-all hover:bg-[#5a2a7b] active:scale-95 disabled:cursor-not-allowed disabled:opacity-70 sm:order-2 2xl:text-xl"
      >
        {{ confirmationButtonText }}
      </button>
    </div>
  </app-dialog-ui>
</div>

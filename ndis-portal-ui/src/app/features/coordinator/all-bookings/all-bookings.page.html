<div class="mx-auto max-w-[2560px] space-y-5 p-4 md:space-y-6 md:p-6 2xl:p-8 min-[3840px]:max-w-[3200px] min-[3840px]:p-12">
  
  <app-booking-queue-table
    [bookings]="bookings"
    [pagedBookings]="pagedBookings"
    [isLoading]="isLoadingBookings"
    [activeFilterLabel]="activeFilterLabel"
    [selectedFilter]="activeFilter"
    [statusOptions]="statusOptions"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    [pageNumbers]="pageNumbers"
    [showingEnd]="showingEnd"
    [showWorkerAssignment]="true"
    (refresh)="refreshBookings()"
    (statusChange)="handleStatusFilter($event)"
    (previousPage)="previousPage()"
    (nextPage)="nextPage()"
    (pageChange)="goToPage($event)"
    (approve)="requestApproveBooking($event)"
    (cancel)="requestCancelBooking($event)"
    (assignWorker)="openAssignWorker($event)"
    (unassignWorker)="requestUnassignWorker($event)">
  </app-booking-queue-table>

  <app-dialog-ui
    [isOpen]="!!pendingAction"
    [label]="confirmationTitle"
    (close)="closeActionConfirmation()"
  >
    <div body class="space-y-3">
      <p class="m-0 text-sm font-medium text-slate-900 2xl:text-xl">
        {{ confirmationMessage }}
      </p>
      <p class="m-0 text-sm text-slate-500 2xl:text-lg">
        Please confirm before this booking status is updated.
      </p>
    </div>

    <div actions class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row">
      <button
        type="button"
        (click)="closeActionConfirmation()"
        [disabled]="isUpdatingBooking"
        class="order-2 rounded-md border border-violet-200 px-4 py-2 text-xs font-semibold text-violet-700 transition hover:bg-violet-50 disabled:cursor-not-allowed disabled:opacity-60 sm:order-1 2xl:text-xl"
      >
        Dismiss
      </button>

      <button
        type="button"
        (click)="confirmBookingAction()"
        [disabled]="isUpdatingBooking"
        class="order-1 rounded-lg bg-[#6B3293] px-6 py-2 text-xs font-bold text-white shadow-md transition-all hover:bg-[#5a2a7b] active:scale-95 disabled:cursor-not-allowed disabled:opacity-70 sm:order-2 2xl:text-xl"
      >
        {{ confirmationButtonText }}
      </button>
    </div>
  </app-dialog-ui>

  <app-dialog-ui
    [isOpen]="!!selectedAssignBooking"
    label="Assign Worker"
    (close)="closeAssignWorker()"
  >
    <div body class="space-y-4">
      <p class="m-0 text-sm font-medium text-slate-900 2xl:text-xl">
        {{ selectedAssignBookingLabel }}
      </p>

      <label class="block">
        <span class="mb-1 block text-xs font-bold text-slate-600 2xl:text-lg">Active worker</span>
        <select
          class="h-10 w-full rounded-md border border-slate-200 bg-white px-3 text-sm text-slate-700 outline-none transition focus:border-[#6B3293] focus:ring-2 focus:ring-violet-100 2xl:h-14 2xl:text-xl"
          [(ngModel)]="selectedWorkerId"
        >
          <option value="">Select a worker</option>
          <option *ngFor="let worker of eligibleWorkers" [value]="worker.id">
            {{ worker.fullName }}
          </option>
        </select>
      </label>

      <p *ngIf="eligibleWorkers.length === 0" class="m-0 rounded-md bg-amber-50 px-3 py-2 text-sm text-amber-700 2xl:text-lg">
        No active workers are assigned to this booking's service.
      </p>
    </div>

    <div actions class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row">
      <button
        type="button"
        (click)="closeAssignWorker()"
        [disabled]="isAssigningWorker"
        class="order-2 rounded-md border border-violet-200 px-4 py-2 text-xs font-semibold text-violet-700 transition hover:bg-violet-50 disabled:cursor-not-allowed disabled:opacity-60 sm:order-1 2xl:text-xl"
      >
        Dismiss
      </button>

      <button
        type="button"
        (click)="confirmAssignWorker()"
        [disabled]="isAssigningWorker || !selectedWorkerId"
        class="order-1 rounded-lg bg-[#6B3293] px-6 py-2 text-xs font-bold text-white shadow-md transition-all hover:bg-[#5a2a7b] active:scale-95 disabled:cursor-not-allowed disabled:opacity-70 sm:order-2 2xl:text-xl"
      >
        {{ isAssigningWorker ? 'Assigning...' : 'Assign Worker' }}
      </button>
    </div>
  </app-dialog-ui>

  <app-dialog-ui
    [isOpen]="!!workerToUnassignBooking"
    label="Remove Assigned Worker?"
    (close)="closeUnassignWorker()"
  >
    <div body class="space-y-3">
      <p class="m-0 text-sm font-medium text-slate-900 2xl:text-xl">
        Remove {{ workerToUnassignName || 'this worker' }} from this booking?
      </p>
      <p class="m-0 text-sm text-slate-500 2xl:text-lg">
        The booking will return to having no assigned worker.
      </p>
    </div>

    <div actions class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row">
      <button
        type="button"
        (click)="closeUnassignWorker()"
        [disabled]="isAssigningWorker"
        class="order-2 rounded-md border border-violet-200 px-4 py-2 text-xs font-semibold text-violet-700 transition hover:bg-violet-50 disabled:cursor-not-allowed disabled:opacity-60 sm:order-1 2xl:text-xl"
      >
        Dismiss
      </button>

      <button
        type="button"
        (click)="confirmUnassignWorker()"
        [disabled]="isAssigningWorker"
        class="order-1 rounded-lg bg-[#6B3293] px-6 py-2 text-xs font-bold text-white shadow-md transition-all hover:bg-[#5a2a7b] active:scale-95 disabled:cursor-not-allowed disabled:opacity-70 sm:order-2 2xl:text-xl"
      >
        {{ isAssigningWorker ? 'Removing...' : 'Remove Worker' }}
      </button>
    </div>
  </app-dialog-ui>
</div>
